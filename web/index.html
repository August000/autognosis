<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solace — Shapes of Thought</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #e0e0e8;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Header ──────────────────────────────────────── */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
      pointer-events: none;
    }

    #header > * { pointer-events: auto; }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8888aa;
      white-space: nowrap;
    }

    .logo span { color: #b8b8ff; }

    .header-center {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ── Search bar ──────────────────────────────────── */
    .search-wrapper {
      position: relative;
    }

    #search-input {
      width: 260px;
      padding: 8px 14px 8px 32px;
      background: rgba(20, 20, 30, 0.8);
      border: 1px solid rgba(120, 120, 180, 0.15);
      border-radius: 8px;
      color: #ccccee;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      backdrop-filter: blur(12px);
      transition: border-color 0.2s, width 0.3s;
    }

    #search-input:focus {
      border-color: rgba(120, 120, 200, 0.4);
      width: 320px;
    }

    #search-input::placeholder { color: #555577; }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #555577;
      font-size: 12px;
      pointer-events: none;
    }

    #search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 4px;
      background: rgba(15, 15, 22, 0.95);
      border: 1px solid rgba(120, 120, 180, 0.15);
      border-radius: 8px;
      max-height: 240px;
      overflow-y: auto;
      display: none;
      backdrop-filter: blur(12px);
    }

    #search-results.visible { display: block; }

    .search-result-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(120, 120, 180, 0.06);
      transition: background 0.15s;
    }

    .search-result-item:hover { background: rgba(100, 100, 200, 0.1); }
    .search-result-item:last-child { border-bottom: none; }

    .search-result-item .sr-label {
      font-size: 13px;
      color: #ccccee;
      font-weight: 500;
    }

    .search-result-item .sr-desc {
      font-size: 11px;
      color: #777799;
      margin-top: 2px;
    }

    /* ── Topology selector ───────────────────────────── */
    .topology-bar {
      display: flex;
      gap: 4px;
      background: rgba(20, 20, 30, 0.8);
      border: 1px solid rgba(120, 120, 180, 0.15);
      border-radius: 10px;
      padding: 4px;
      backdrop-filter: blur(12px);
    }

    .topo-btn {
      background: transparent;
      border: none;
      color: #666688;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      padding: 8px 16px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit;
    }

    .topo-btn:hover {
      color: #b8b8ff;
      background: rgba(120, 120, 200, 0.08);
    }

    .topo-btn.active {
      color: #e0e0ff;
      background: rgba(100, 100, 200, 0.2);
      box-shadow: 0 0 12px rgba(120, 120, 255, 0.1);
    }

    /* ── Info panel ──────────────────────────────────── */
    #info-panel {
      position: fixed;
      bottom: 24px;
      left: 28px;
      z-index: 100;
      width: 380px;
      max-height: 75vh;
      overflow-y: auto;
      background: rgba(15, 15, 22, 0.92);
      border: 1px solid rgba(120, 120, 180, 0.12);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(12px);
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.3s ease;
      pointer-events: none;
    }

    #info-panel.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #info-panel h3 {
      font-size: 16px;
      font-weight: 600;
      color: #c8c8ff;
      margin-bottom: 6px;
    }

    #info-description {
      font-size: 13px;
      color: #aaaacc;
      line-height: 1.5;
      margin-bottom: 12px;
      font-style: italic;
    }

    /* ── Connections section (navigable) ──────────── */
    .section-header {
      font-size: 11px;
      color: #7777aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    #info-panel ul { list-style: none; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      margin-bottom: 3px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .nav-link:hover {
      background: rgba(100, 100, 200, 0.1);
    }

    .nav-link .nav-arrow {
      font-size: 14px;
      color: #7777aa;
      flex-shrink: 0;
      width: 16px;
      text-align: center;
    }

    .nav-link .nav-edge {
      font-size: 11px;
      color: #8888bb;
      flex-shrink: 0;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .nav-link .nav-name {
      font-size: 12px;
      color: #ccccee;
      font-weight: 500;
    }

    .nav-link .nav-goto {
      margin-left: auto;
      font-size: 10px;
      color: #555577;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .nav-link:hover .nav-goto { opacity: 1; }

    /* ── Knowledge detail section ─────────────────── */
    #detail-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(120, 120, 180, 0.1);
    }

    #detail-content {
      font-size: 12px;
      color: #aaaacc;
      line-height: 1.6;
      padding: 10px 12px;
      background: rgba(80, 80, 140, 0.06);
      border-radius: 8px;
      border: 1px solid rgba(120, 120, 180, 0.08);
    }

    .detail-loading {
      font-size: 11px;
      color: #555577;
      font-style: italic;
    }

    /* ── Memories section ─────────────────────────── */
    #memories-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(120, 120, 180, 0.1);
    }

    .memory-item {
      font-size: 12px;
      color: #9999bb;
      line-height: 1.5;
      padding: 8px 10px;
      margin-bottom: 6px;
      background: rgba(100, 100, 160, 0.06);
      border-left: 2px solid rgba(120, 120, 200, 0.3);
      border-radius: 0 6px 6px 0;
    }

    .memory-item:last-child { margin-bottom: 0; }

    .memories-loading {
      font-size: 11px;
      color: #555577;
      font-style: italic;
    }

    /* ── Ghost node suggestions ───────────────────── */
    #suggest-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(120, 120, 180, 0.1);
    }

    .ghost-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 4px;
      background: rgba(200, 100, 180, 0.06);
      border: 1px dashed rgba(200, 100, 180, 0.25);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-align: left;
    }

    .ghost-btn:hover {
      background: rgba(200, 100, 180, 0.12);
      border-color: rgba(200, 100, 180, 0.4);
    }

    .ghost-btn.materialized {
      background: rgba(120, 100, 200, 0.12);
      border: 1px solid rgba(120, 100, 200, 0.3);
      border-style: solid;
      cursor: default;
    }

    .ghost-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e866b0;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .ghost-btn.materialized .ghost-dot {
      background: #7B68EE;
    }

    .ghost-label {
      font-size: 12px;
      color: #cc88bb;
      font-weight: 500;
    }

    .ghost-btn.materialized .ghost-label {
      color: #b8b8ff;
    }

    .ghost-reason {
      font-size: 10px;
      color: #777799;
      margin-top: 1px;
    }

    /* ── Stats ────────────────────────────────────── */
    #stats {
      position: fixed;
      bottom: 24px;
      right: 28px;
      z-index: 100;
      font-size: 11px;
      color: #44446a;
      text-align: right;
      line-height: 1.6;
    }

    /* ── Loading ──────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #0a0a0f;
      z-index: 200;
      transition: opacity 0.5s ease;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }

    .loader {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(120, 120, 200, 0.15);
      border-top-color: #8888cc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #loading-text {
      font-size: 12px;
      color: #555577;
      letter-spacing: 1px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Topo description ────────────────────────── */
    .topo-desc {
      position: fixed;
      top: 64px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-size: 12px;
      color: #666688;
      text-align: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .topo-desc.visible { opacity: 1; }

    /* ── Graph container ─────────────────────────── */
    #graph-container { width: 100vw; height: 100vh; }

    /* ── Scrollbar ────────────────────────────────── */
    #info-panel::-webkit-scrollbar,
    #search-results::-webkit-scrollbar { width: 4px; }
    #info-panel::-webkit-scrollbar-track,
    #search-results::-webkit-scrollbar-track { background: transparent; }
    #info-panel::-webkit-scrollbar-thumb,
    #search-results::-webkit-scrollbar-thumb {
      background: rgba(120, 120, 180, 0.2);
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="loader"></div>
    <div id="loading-text">mapping thoughts...</div>
  </div>

  <div id="header">
    <div class="logo">Solace <span>// shapes of thought</span></div>
    <div class="header-center">
      <div class="search-wrapper">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="search-input" placeholder="search concepts, feelings, ideas..." autocomplete="off" />
        <div id="search-results"></div>
      </div>
      <div class="topology-bar">
        <button class="topo-btn active" data-topology="raw">All</button>
        <button class="topo-btn" data-topology="centralized">Centralized</button>
        <button class="topo-btn" data-topology="decentralized">Decentralized</button>
        <button class="topo-btn" data-topology="distributed">Distributed</button>
      </div>
    </div>
  </div>

  <div class="topo-desc" id="topo-desc"></div>

  <div id="info-panel">
    <h3 id="info-title"></h3>
    <div id="info-description"></div>
    <div class="section-header" id="info-connections"></div>
    <ul id="info-list"></ul>
    <div id="detail-section" style="display: none;">
      <div class="section-header">first principles</div>
      <div id="detail-content"></div>
    </div>
    <div id="memories-section" style="display: none;">
      <div class="section-header">original thoughts</div>
      <div id="memories-content"></div>
    </div>
    <div id="suggest-section" style="display: none;">
      <div class="section-header">explore further</div>
      <div id="suggest-content"></div>
    </div>
  </div>

  <div id="stats"></div>

  <div id="graph-container"></div>

  <!-- Three.js + 3D Force Graph -->
  <script src="/static/three.min.js"></script>
  <script src="/static/three-spritetext.min.js"></script>
  <script src="/static/3d-force-graph.min.js"></script>

  <script>

    const DESCRIPTIONS = {
      raw: 'Full graph -- every concept and connection, enriched with meaning',
      centralized: 'One core idea connecting all others -- hub and spoke',
      decentralized: 'Ideas cluster into themed hubs -- communities of thought',
      distributed: 'Equal mesh -- every edge labeled with how ideas connect',
    };

    const CLUSTER_COLORS = [
      '#7B68EE', '#FF6B8A', '#4ECDC4', '#FFD93D', '#6BCB77',
      '#9B59B6', '#E67E22', '#1ABC9C', '#E74C3C', '#3498DB',
      '#F39C12', '#2ECC71', '#E91E63', '#00BCD4', '#FF5722',
    ];

    let currentGraph = null;
    let currentTopology = 'raw';
    let highlightNodes = new Set();
    let highlightLinks = new Set();
    let selectedNode = null;
    let ghostNodes = new Set(); // track ghost node IDs

    // ── Helper: get node color ────────────────────────
    function getNodeColor(node) {
      if (node._isGhost) return '#e866b0';
      if (highlightNodes.has(node.id)) return '#ffffff';
      if (node.isCore) return '#FFD700';
      if (node.isHub) return '#FF6B8A';
      return CLUSTER_COLORS[node.group % CLUSTER_COLORS.length];
    }

    // ── Initialize 3D Graph ──────────────────────────
    const Graph = ForceGraph3D()(document.getElementById('graph-container'))
      .backgroundColor('#0a0a0f')
      .showNavInfo(false)
      .nodeLabel(node => {
        if (node.description) {
          return '<div style="background:rgba(15,15,22,0.95);padding:8px 12px;border-radius:8px;border:1px solid rgba(120,120,180,0.2);max-width:250px;font-size:12px;line-height:1.4;color:#ccccee;">'
            + '<div style="font-weight:600;color:#c8c8ff;margin-bottom:4px;">' + node.label + '</div>'
            + '<div style="color:#9999bb;font-style:italic;">' + node.description + '</div>'
            + '</div>';
        }
        return node.label || '';
      })
      .nodeColor(getNodeColor)
      .nodeVal(node => {
        // Small spheres: 1 for normal, slightly larger for special
        if (node._isGhost) return 0.8;
        if (node.isCore) return 3;
        if (node.isHub) return 2;
        if (highlightNodes.has(node.id)) return 1.5;
        return 0.8;
      })
      .nodeOpacity(node => node._isGhost ? 0.5 : 0.85)
      .nodeRelSize(3)
      .linkColor(link => {
        if (highlightLinks.has(link)) return 'rgba(200, 200, 255, 0.8)';
        return 'rgba(100, 100, 160, 0.3)';
      })
      .linkWidth(link => highlightLinks.has(link) ? 1.5 : 0.3)
      .linkDirectionalParticles(link => highlightLinks.has(link) ? 2 : 0)
      .linkDirectionalParticleWidth(1.5)
      .linkDirectionalParticleColor(() => '#b8b8ff')
      .nodeThreeObjectExtend(true)
      .nodeThreeObject(node => {
        // Text label offset to the right of the small sphere
        const sprite = new SpriteText(node.label || '');
        sprite.color = node._isGhost ? 'rgba(232, 102, 176, 0.6)' :
                       node.isCore ? '#FFD700' :
                       node.isHub ? '#FF6B8A' :
                       'rgba(200, 200, 230, 0.75)';
        sprite.textHeight = node.isCore ? 3.5 : node.isHub ? 2.8 : 1.8;
        // Position label to the right and slightly above the sphere
        sprite.position.set(
          node.isCore ? 6 : node.isHub ? 5 : 3.5,
          node.isCore ? 2 : 1,
          0
        );
        sprite.fontWeight = node.isCore ? 'bold' : 'normal';
        return sprite;
      })
      // Edge labels
      .linkThreeObjectExtend(true)
      .linkThreeObject(link => {
        const text = link.label || link.type || '';
        if (!text) return null;
        const sprite = new SpriteText(text);
        sprite.color = highlightLinks.has(link)
          ? 'rgba(200, 200, 240, 0.9)'
          : 'rgba(140, 140, 190, 0.35)';
        sprite.textHeight = 1.0;
        sprite.fontWeight = '400';
        return sprite;
      })
      .linkPositionUpdate((sprite, { start, end }) => {
        if (!sprite) return;
        Object.assign(sprite.position, {
          x: (start.x + end.x) / 2,
          y: (start.y + end.y) / 2,
          z: (start.z + end.z) / 2,
        });
      })
      .onNodeClick(onNodeClick)
      .onBackgroundClick(() => {
        highlightNodes.clear();
        highlightLinks.clear();
        selectedNode = null;
        hideInfoPanel();
        refreshVisuals();
      });

    function refreshVisuals() {
      Graph.nodeColor(Graph.nodeColor())
           .linkColor(Graph.linkColor())
           .linkWidth(Graph.linkWidth())
           .linkDirectionalParticles(Graph.linkDirectionalParticles())
           .linkThreeObject(Graph.linkThreeObject());
    }

    // ── Node click handler ──────────────────────────
    function onNodeClick(node) {
      if (!node) return;
      selectAndFocusNode(node, true);
    }

    function selectAndFocusNode(node, flyTo) {
      selectedNode = node;
      highlightNodes.clear();
      highlightLinks.clear();
      highlightNodes.add(node.id);

      const neighbors = [];
      currentGraph.links.forEach(link => {
        const srcId = typeof link.source === 'object' ? link.source.id : link.source;
        const tgtId = typeof link.target === 'object' ? link.target.id : link.target;
        if (srcId === node.id) {
          highlightNodes.add(tgtId);
          highlightLinks.add(link);
          const tgtNode = currentGraph.nodes.find(n => n.id === tgtId);
          neighbors.push({
            id: tgtId,
            label: tgtNode ? tgtNode.label : tgtId,
            edgeLabel: link.label || link.type || '',
            direction: 'out',
          });
        }
        if (tgtId === node.id) {
          highlightNodes.add(srcId);
          highlightLinks.add(link);
          const srcNode = currentGraph.nodes.find(n => n.id === srcId);
          neighbors.push({
            id: srcId,
            label: srcNode ? srcNode.label : srcId,
            edgeLabel: link.label || link.type || '',
            direction: 'in',
          });
        }
      });

      showInfoPanel(node, neighbors);
      fetchMemories(node);
      fetchDetail(node, neighbors);
      fetchSuggestions(node, neighbors);
      refreshVisuals();

      if (flyTo) {
        // Fly camera to node
        const distance = 120;
        const distRatio = 1 + distance / Math.hypot(node.x || 0, node.y || 0, node.z || 0);
        Graph.cameraPosition(
          { x: (node.x || 0) * distRatio, y: (node.y || 0) * distRatio, z: (node.z || 0) * distRatio },
          { x: node.x || 0, y: node.y || 0, z: node.z || 0 },
          1200
        );
      }
    }

    // ── Search ──────────────────────────────────────
    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    let searchTimeout = null;

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      const q = searchInput.value.trim();
      if (!q) {
        searchResults.classList.remove('visible');
        return;
      }
      searchTimeout = setTimeout(() => doSearch(q), 200);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        searchInput.blur();
        searchResults.classList.remove('visible');
      }
    });

    // Close search when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrapper')) {
        searchResults.classList.remove('visible');
      }
    });

    // Global keyboard shortcut: / to focus search
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
      }
    });

    async function doSearch(q) {
      try {
        const resp = await fetch('/api/search?q=' + encodeURIComponent(q));
        const data = await resp.json();
        searchResults.innerHTML = '';
        if (data.results && data.results.length > 0) {
          data.results.forEach(r => {
            const div = document.createElement('div');
            div.className = 'search-result-item';
            div.innerHTML = '<div class="sr-label">' + escapeHtml(r.label) + '</div>'
              + (r.description ? '<div class="sr-desc">' + escapeHtml(r.description) + '</div>' : '');
            div.addEventListener('click', () => {
              searchResults.classList.remove('visible');
              searchInput.value = r.label;
              searchInput.blur();
              // Find the node in the rendered graph and fly to it
              const node = currentGraph.nodes.find(n => n.id === r.id);
              if (node) selectAndFocusNode(node, true);
            });
            searchResults.appendChild(div);
          });
          searchResults.classList.add('visible');
        } else {
          searchResults.classList.remove('visible');
        }
      } catch (err) {
        console.error('Search failed:', err);
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Fetch and render ────────────────────────────
    async function loadGraph(topology) {
      currentTopology = topology;
      const loading = document.getElementById('loading');
      const loadingText = document.getElementById('loading-text');
      loading.classList.remove('hidden');
      loadingText.textContent = topology === 'raw' || !currentGraph
        ? 'enriching thoughts with meaning...'
        : 'reshaping topology...';

      try {
        const resp = await fetch('/api/graph?topology=' + topology);
        const data = await resp.json();
        currentGraph = data;
        ghostNodes.clear();

        // Configure forces per topology
        if (topology === 'centralized' && data.coreId) {
          Graph.d3Force('center', null);
          Graph.d3Force('charge').strength(-120);
          Graph.d3Force('cluster', null);
        } else if (topology === 'decentralized') {
          Graph.d3Force('charge').strength(-80);
          Graph.d3Force('cluster', alpha => {
            const nodes = Graph.graphData().nodes;
            const centroids = {};
            const counts = {};
            nodes.forEach(n => {
              if (!centroids[n.group]) {
                centroids[n.group] = { x: 0, y: 0, z: 0 };
                counts[n.group] = 0;
              }
              centroids[n.group].x += n.x || 0;
              centroids[n.group].y += n.y || 0;
              centroids[n.group].z += n.z || 0;
              counts[n.group]++;
            });
            Object.keys(centroids).forEach(g => {
              centroids[g].x /= counts[g];
              centroids[g].y /= counts[g];
              centroids[g].z /= counts[g];
            });
            const k = alpha * 0.3;
            nodes.forEach(n => {
              const c = centroids[n.group];
              if (!c) return;
              n.vx = (n.vx || 0) + (c.x - (n.x || 0)) * k;
              n.vy = (n.vy || 0) + (c.y - (n.y || 0)) * k;
              n.vz = (n.vz || 0) + (c.z - (n.z || 0)) * k;
            });
          });
        } else if (topology === 'distributed') {
          Graph.d3Force('charge').strength(-150);
          Graph.d3Force('cluster', null);
        } else {
          Graph.d3Force('charge').strength(-60);
          Graph.d3Force('cluster', null);
        }

        Graph.graphData(data);
        updateStats(data);

        highlightNodes.clear();
        highlightLinks.clear();
        selectedNode = null;
        hideInfoPanel();

      } catch (err) {
        console.error('Failed to load graph:', err);
      } finally {
        setTimeout(() => loading.classList.add('hidden'), 300);
      }
    }

    // ── Info panel ──────────────────────────────────
    function showInfoPanel(node, neighbors) {
      const panel = document.getElementById('info-panel');
      document.getElementById('info-title').textContent = node.label || node.id;

      const descEl = document.getElementById('info-description');
      if (node.description) {
        descEl.textContent = node.description;
        descEl.style.display = 'block';
      } else {
        descEl.style.display = 'none';
      }

      document.getElementById('info-connections').textContent =
        neighbors.length + ' connection' + (neighbors.length !== 1 ? 's' : '');

      // Build navigable neighbor list
      const list = document.getElementById('info-list');
      list.innerHTML = '';
      neighbors.forEach(n => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.className = 'nav-link';
        btn.innerHTML =
          '<span class="nav-arrow">' + (n.direction === 'out' ? '&rarr;' : '&larr;') + '</span>'
          + '<span class="nav-edge">' + escapeHtml(n.edgeLabel) + '</span>'
          + '<span class="nav-name">' + escapeHtml(n.label) + '</span>'
          + '<span class="nav-goto">go &rarr;</span>';
        btn.addEventListener('click', () => {
          // Navigate to this neighbor
          const targetNode = currentGraph.nodes.find(nd => nd.id === n.id);
          if (targetNode) selectAndFocusNode(targetNode, true);
        });
        li.appendChild(btn);
        list.appendChild(li);
      });

      // Reset sections
      document.getElementById('detail-section').style.display = 'none';
      document.getElementById('detail-content').innerHTML = '';
      document.getElementById('memories-section').style.display = 'none';
      document.getElementById('memories-content').innerHTML = '';
      document.getElementById('suggest-section').style.display = 'none';
      document.getElementById('suggest-content').innerHTML = '';

      panel.classList.add('visible');
    }

    function hideInfoPanel() {
      document.getElementById('info-panel').classList.remove('visible');
    }

    // ── Fetch first-principles detail ───────────────
    async function fetchDetail(node, neighbors) {
      const section = document.getElementById('detail-section');
      const content = document.getElementById('detail-content');

      section.style.display = 'block';
      content.innerHTML = '<div class="detail-loading">thinking from first principles...</div>';

      try {
        const neighborLabels = neighbors.map(n => n.label).join(',');
        const resp = await fetch(
          '/api/node/' + encodeURIComponent(node.id)
          + '/detail?label=' + encodeURIComponent(node.label || '')
          + '&neighbors=' + encodeURIComponent(neighborLabels)
        );
        const data = await resp.json();
        if (data.detail) {
          content.textContent = data.detail;
        } else {
          section.style.display = 'none';
        }
      } catch (err) {
        section.style.display = 'none';
      }
    }

    // ── Fetch memories for a node ───────────────────
    async function fetchMemories(node) {
      const section = document.getElementById('memories-section');
      const content = document.getElementById('memories-content');

      section.style.display = 'block';
      content.innerHTML = '<div class="memories-loading">searching memories...</div>';

      try {
        const resp = await fetch('/api/node/' + encodeURIComponent(node.id) + '/memories?label=' + encodeURIComponent(node.label || ''));
        const data = await resp.json();

        if (data.memories && data.memories.length > 0) {
          content.innerHTML = '';
          data.memories.forEach(m => {
            const div = document.createElement('div');
            div.className = 'memory-item';
            div.textContent = m.text;
            content.appendChild(div);
          });
        } else {
          content.innerHTML = '<div class="memories-loading">no memories found for this concept</div>';
        }
      } catch (err) {
        content.innerHTML = '<div class="memories-loading">could not load memories</div>';
      }
    }

    // ── Fetch suggestions for leaf nodes ────────────
    async function fetchSuggestions(node, neighbors) {
      // Only suggest for leaf nodes (0-2 connections) or always show
      const section = document.getElementById('suggest-section');
      const content = document.getElementById('suggest-content');

      if (neighbors.length > 5) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      content.innerHTML = '<div class="memories-loading">finding related concepts...</div>';

      try {
        const resp = await fetch(
          '/api/node/' + encodeURIComponent(node.id)
          + '/suggest?label=' + encodeURIComponent(node.label || '')
        );
        const data = await resp.json();

        if (data.suggestions && data.suggestions.length > 0) {
          content.innerHTML = '';
          data.suggestions.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'ghost-btn';
            btn.innerHTML =
              '<div class="ghost-dot"></div>'
              + '<div>'
              + '<div class="ghost-label">' + escapeHtml(s.label) + '</div>'
              + '<div class="ghost-reason">' + escapeHtml(s.reason || '') + '</div>'
              + '</div>';
            btn.addEventListener('click', () => materializeGhost(btn, s, node));
            content.appendChild(btn);
          });
        } else {
          section.style.display = 'none';
        }
      } catch (err) {
        section.style.display = 'none';
      }
    }

    // ── Materialize ghost node ──────────────────────
    async function materializeGhost(btnEl, suggestion, parentNode) {
      if (btnEl.classList.contains('materialized')) return;
      btnEl.classList.add('materialized');

      try {
        const resp = await fetch(
          '/api/node/' + encodeURIComponent(parentNode.id)
          + '/materialize?label=' + encodeURIComponent(suggestion.label)
          + '&reason=' + encodeURIComponent(suggestion.reason || ''),
          { method: 'POST' }
        );
        const data = await resp.json();

        if (data.success && data.node) {
          // Add the new node + link to the live graph
          const gd = Graph.graphData();
          const newNode = {
            ...data.node,
            group: parentNode.group || 0,
            x: (parentNode.x || 0) + (Math.random() - 0.5) * 40,
            y: (parentNode.y || 0) + (Math.random() - 0.5) * 40,
            z: (parentNode.z || 0) + (Math.random() - 0.5) * 40,
          };

          gd.nodes.push(newNode);
          gd.links.push({
            source: data.node.id,
            target: parentNode.id,
            type: 'SUGGESTED_BY',
            label: suggestion.reason || 'explore further',
          });

          // Also update currentGraph
          currentGraph.nodes.push(newNode);
          currentGraph.links.push({
            source: data.node.id,
            target: parentNode.id,
            type: 'SUGGESTED_BY',
            label: suggestion.reason || 'explore further',
          });

          Graph.graphData(gd);
          updateStats(currentGraph);
        }
      } catch (err) {
        console.error('Materialize failed:', err);
        btnEl.classList.remove('materialized');
      }
    }

    // ── Stats ───────────────────────────────────────
    function updateStats(data) {
      const stats = document.getElementById('stats');
      const nodeCount = data.nodes ? data.nodes.length : 0;
      const linkCount = data.links ? data.links.length : 0;
      const clusterInfo = data.clusters ? data.clusters + ' clusters' : '';
      stats.innerHTML = nodeCount + ' nodes &middot; ' + linkCount + ' edges'
        + (clusterInfo ? ' &middot; ' + clusterInfo : '');
    }

    // ── Topology buttons ────────────────────────────
    document.querySelectorAll('.topo-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.topo-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const topology = btn.dataset.topology;

        const desc = document.getElementById('topo-desc');
        desc.textContent = DESCRIPTIONS[topology] || '';
        desc.classList.add('visible');
        setTimeout(() => desc.classList.remove('visible'), 3000);

        loadGraph(topology);
      });
    });

    // ── Init ────────────────────────────────────────
    loadGraph('raw');
  </script>

</body>
