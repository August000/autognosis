<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solace — Shapes of Thought</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <div id="loading">
    <div class="loader"></div>
    <div id="loading-text">mapping thoughts...</div>
  </div>

  <div id="header">
    <div class="logo">Solace <span>// shapes of thought</span></div>
    <div class="header-center">
      <div class="search-wrapper">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="search-input" placeholder="search concepts, feelings, ideas..." autocomplete="off" />
        <div id="search-results"></div>
      </div>
      <div class="topology-bar">
        <button class="topo-btn active" data-topology="raw">All</button>
        <button class="topo-btn" data-topology="centralized">Centralized</button>
        <button class="topo-btn" data-topology="decentralized">Decentralized</button>
        <button class="topo-btn" data-topology="distributed">Distributed</button>
      </div>
    </div>
  </div>

  <div class="topo-desc" id="topo-desc"></div>

  <div id="info-panel">
    <h3 id="info-title"></h3>
    <div id="info-description"></div>
    <div class="section-header" id="info-connections"></div>
    <ul id="info-list"></ul>
    <div id="detail-section" style="display: none;">
      <div class="section-header">wikipedia</div>
      <div id="detail-content"></div>
    </div>
    <div id="suggestions-section" style="display: none;">
      <div class="section-header">explore further</div>
      <div id="suggestions-content"></div>
    </div>
    <div id="memories-section" style="display: none;">
      <div class="section-header">original thoughts</div>
      <div id="memories-content"></div>
    </div>
  </div>

  <div id="stats"></div>
  <div id="graph-container"></div>

  <!-- Article Reader Modal -->
  <div id="article-modal">
    <div id="article-modal-inner">
      <div id="article-modal-header">
        <div id="article-modal-title"></div>
        <button id="article-modal-close">&times;</button>
      </div>
      <div id="article-modal-body"></div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div id="chat-header">
      <span id="chat-header-title">Chat</span>
      <button id="chat-new-btn" title="New conversation">+</button>
      <button id="chat-history-btn" title="Conversation history">&#x2630;</button>
      <select id="chat-model-select">
        <option value="gpt-4o-mini">GPT-4o Mini</option>
        <option value="gpt-4o">GPT-4o</option>
        <option value="gpt-4-turbo">GPT-4 Turbo</option>
      </select>
      <button id="chat-toggle" title="Minimize">_</button>
    </div>
    <div id="chat-conversations"></div>
    <div id="chat-messages">
      <div id="chat-empty">ask anything about your knowledge graph...</div>
    </div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="Ask about your knowledge graph..." rows="1"></textarea>
      <button id="chat-send">Send</button>
    </div>
  </div>

  <script src="/static/three.min.js"></script>
  <script src="/static/three-spritetext.min.js"></script>
  <script src="/static/3d-force-graph.min.js"></script>
  <script src="/static/app.js"></script>

</body>
</html>
